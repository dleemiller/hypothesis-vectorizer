# Validate the grow-then-select evolution (commit 785e051) + best checkpointing on the winning
# config. Identical to trec_best_l_max (answer-oriented instr + covariance dedup + tfidf_svd 128,
# pool 64, 10 rounds, -l) but with the NEW monotonic evolve: generate 64 -> merge to 128 ->
# importance+covariance prune to 64, accept gate, ship best-held-out checkpoint. Compare test acc
# to trec_best_l_max (old blind-swap evolve, 0.964) — should hold or improve, and never regress
# mid-evolution.
run_name: trec_growselect_l
seed: 7
data: {name: trec}
encoder: {model: dleemiller/finecat-nli-l}
pool: {size: 64, rounds: 10, patience: 4}
lexical: {kind: tfidf_svd, dims: 128}
